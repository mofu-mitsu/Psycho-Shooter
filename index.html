<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>心理シューティング - とりの丘学園</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        
        <!-- 🌟 タイトル画面（ルール説明復活！） -->
        <div id="title-screen" class="screen active">
            <h1><i class="fa-solid fa-brain"></i> Psycho Shooter</h1>
            <div class="input-group">
                <i class="fa-solid fa-user-pen"></i>
                <input type="text" id="player-name-input" placeholder="プレイヤー名" maxlength="10">
            </div>
            <button id="start-btn"><i class="fa-solid fa-play"></i> スタート</button>
            
            <div class="rules-box">
                <h3>🎮 遊び方</h3>
                <p>・<b>PC</b>：マウスを動かして移動</p>
                <p>・<b>スマホ</b>：スワイプで移動</p>
                <p>・弾(言葉)は<b>オート連射</b>！</p>
                <p>・ゲージが溜まったら<b>スキル</b>発動！</p>
            </div>
        </div>

        <div id="stage-select-screen" class="screen">
            <h2>向き合う感情を選んでね</h2>
            <div id="stage-buttons" class="grid-container"></div>
        </div>

        <!-- 🌟 プロフ画面（メインとサポートを並べる！） -->
        <div id="profile-screen" class="screen" style="justify-content: flex-start; overflow-y: auto;">
            <h2 id="prof-stage-title" style="margin-top: 20px;"></h2>
            
            <div class="prof-container">
                <!-- メインキャラ -->
                <div class="prof-card">
                    <div class="prof-role">【メイン（敵対）】 <span id="prof-main-class" class="class-badge"></span></div>
                    <div class="prof-card-inner">
                        <img id="prof-main-img" src="" alt="Main">
                        <div class="prof-info">
                            <h3 id="prof-main-fullname"></h3>
                            <p><b>性別:</b> <span id="prof-main-gender"></span></p>
                            <p id="prof-main-desc"></p>
                        </div>
                    </div>
                </div>

                <!-- サポートキャラ -->
                <div class="prof-card">
                    <div class="prof-role">【サポート（共闘）】 <span id="prof-supp-class" class="class-badge"></span></div>
                    <div class="prof-card-inner">
                        <img id="prof-supp-img" src="" alt="Support">
                        <div class="prof-info">
                            <h3 id="prof-supp-fullname"></h3>
                            <p><b>性別:</b> <span id="prof-supp-gender"></span></p>
                            <p id="prof-supp-desc"></p>
                        </div>
                    </div>
                </div>
            </div>

            <div style="margin: 20px 0; display:flex; gap:10px;">
                <button id="back-to-select-from-prof-btn"><i class="fa-solid fa-rotate-left"></i> 戻る</button>
                <button id="start-battle-btn"><i class="fa-solid fa-crosshairs"></i> 感情と向き合う</button>
            </div>
        </div>

        <div id="game-ui" class="hidden">
            <div id="top-bar">
                <div class="gauge-container">
                    <i class="fa-solid fa-heart" style="color:#ff4444;"></i>
                    <div class="gauge-bg"><div id="hp-bar" class="gauge-fill hp-fill"></div></div>
                </div>
                <div class="score-box"><i class="fa-solid fa-star" style="color:#ffff44;"></i> <span id="score-display">0</span>/1000</div>
            </div>
            
            <div id="skill-container">
                <button id="skill-btn" disabled><i class="fa-solid fa-bolt"></i> スキル</button>
                <div class="gauge-bg skill-bg"><div id="skill-bar" class="gauge-fill skill-fill"></div></div>
            </div>

            <div id="dialogue-area">
                <div class="chara-box">
                    <img id="main-chara-img" src="" alt="Main">
                    <div id="main-name" class="chara-name">メイン</div>
                </div>
                <div id="dialogue-balloon" class="balloon">
                    <span id="speaker-name"></span>「<span id="dialogue-text"></span>」
                </div>
                <div class="chara-box">
                    <img id="support-chara-img" src="" alt="Support">
                    <div id="support-name" class="chara-name">サポート</div>
                </div>
            </div>
        </div>

        <div id="result-screen" class="screen">
            <h2 id="result-title"></h2>
            <div class="result-dialogue">
                <span id="result-speaker"></span>「<span id="result-text"></span>」
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="back-to-select-btn"><i class="fa-solid fa-rotate-left"></i> ステージ選択</button>
                <button id="back-to-title-btn"><i class="fa-solid fa-home"></i> タイトルへ</button>
            </div>
        </div>

        <canvas id="gameCanvas" width="600" height="800"></canvas>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
